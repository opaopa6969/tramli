name: tramli tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: cd lang/java && mvn test -q

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Using `npm install --legacy-peer-deps` instead of `npm ci` because
      # package-lock.json is out of sync with workspace package.json versions
      # (3.7.1 bump). Once the lock is regenerated this should revert to npm ci.
      - run: npm install --legacy-peer-deps --no-audit
      - run: npm test --workspace=lang/ts

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cd lang/rust && cargo fmt --all -- --check
      - run: cd lang/rust && cargo clippy --all-targets -- -D warnings
      - run: cd lang/rust && cargo test
      - run: cd lang/rust-plugins && cargo fmt --all -- --check
      - run: cd lang/rust-plugins && cargo clippy --all-targets -- -D warnings
      - run: cd lang/rust-plugins && cargo test

  rust-msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.75.0
      - run: cd lang/rust && cargo build
      - run: cd lang/rust-plugins && cargo build
